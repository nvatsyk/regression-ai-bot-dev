name: Regression AI Bot Tests 05:00

on:
  workflow_dispatch:

  schedule:
    # 05:00 Kyiv time = 02:00 UTC
    - cron: '0 2 * * 1-5'

concurrency:
  group: regression-ai-bot-tests-0500
  cancel-in-progress: false

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      # ── Novo Nordisk Q&A Agent ────────────────────────────────────────────

      - name: Run Novo Nordisk Q&A regression
        id: novo
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-novo-nordisk-qa
        run: npx playwright test tests/novo-nordisk-qa.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Novo Nordisk Q&A HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novo-nordisk-qa-playwright-report
          path: playwright-report-novo-nordisk-qa/
          if-no-files-found: ignore

      - name: Upload Novo Nordisk Q&A reports (screenshots + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novo-nordisk-qa-reports
          path: reports/
          if-no-files-found: ignore

      - name: Slack Novo Nordisk PASS notification
        if: steps.novo.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Novo Nordisk Q&A regression passed\nBot correctly greeted and responded to GLP-1 therapy question.\nTest: tests/novo-nordisk-qa.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Novo Nordisk FAIL notification
        if: steps.novo.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Novo Nordisk Q&A regression failed\nFlow: Greeting detection and GLP-1 therapy response.\nTest: tests/novo-nordisk-qa.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Novo Nordisk Mental Health ────────────────────────────────────────

      - name: Run Novo Nordisk Mental Health regression
        id: novo-mh
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-novo-nordisk-mental-health
        run: npx playwright test tests/novo-nordisk-mental-health.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Novo Nordisk Mental Health HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novo-nordisk-mental-health-playwright-report
          path: playwright-report-novo-nordisk-mental-health/
          if-no-files-found: ignore

      - name: Upload Novo Nordisk Mental Health reports (screenshots + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novo-nordisk-mental-health-reports
          path: reports/
          if-no-files-found: ignore

      - name: Slack Novo Nordisk Mental Health PASS notification
        if: steps.novo-mh.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Novo Nordisk Mental Health regression passed\nBot correctly greeted and responded to user message.\nTest: tests/novo-nordisk-mental-health.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Novo Nordisk Mental Health FAIL notification
        if: steps.novo-mh.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Novo Nordisk Mental Health regression failed\nFlow: Start New Session, greeting detection, response to user message.\nTest: tests/novo-nordisk-mental-health.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Taibah AI Q&A ─────────────────────────────────────────────────────

      - name: Run Taibah AI Q&A regression
        id: taibah
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-taibah-ai-qa
        run: npx playwright test tests/taibah-ai-qa.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Taibah AI Q&A HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taibah-ai-qa-playwright-report
          path: playwright-report-taibah-ai-qa/
          if-no-files-found: ignore

      - name: Upload Taibah AI Q&A reports (screenshots + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: taibah-ai-qa-reports
          path: reports/
          if-no-files-found: ignore

      - name: Slack Taibah AI Q&A PASS notification
        if: steps.taibah.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Taibah AI Q&A regression passed\nBot correctly greeted in Arabic and responded to university specializations question.\nTest: tests/taibah-ai-qa.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Taibah AI Q&A FAIL notification
        if: steps.taibah.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Taibah AI Q&A regression failed\nFlow: Arabic greeting detection and specializations response.\nTest: tests/taibah-ai-qa.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Monarch Roofs Outreach ────────────────────────────────────────────

      - name: Run Monarch Roofs Outreach regression
        id: monarch
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-monarch-roofs-outreach
        run: npx playwright test tests/monarch-roofs-outreach.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Monarch Roofs Outreach HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monarch-roofs-outreach-playwright-report
          path: playwright-report-monarch-roofs-outreach/
          if-no-files-found: ignore

      - name: Upload Monarch Roofs Outreach reports (screenshots + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monarch-roofs-outreach-reports
          path: reports/
          if-no-files-found: ignore

      - name: Slack Monarch Roofs PASS notification
        if: steps.monarch.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Monarch Roofs Outreach regression passed\nBot correctly greeted, responded to \"Yes\", and replied after \"good\".\nTest: tests/monarch-roofs-outreach.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Monarch Roofs FAIL notification
        if: steps.monarch.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Monarch Roofs Outreach regression failed\nFlow: Greeting, Yes response, good response.\nTest: tests/monarch-roofs-outreach.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Bengali Appointment Reminder ──────────────────────────────────────

      - name: Run Bengali Appointment Reminder regression
        id: appt-bn
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-appointment-reminder-bn-en
        run: npx playwright test tests/appointment-reminder-bn-en.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Bengali Appointment Reminder HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appointment-reminder-bn-en-playwright-report
          path: playwright-report-appointment-reminder-bn-en/
          if-no-files-found: ignore

      - name: Upload Bengali Appointment Reminder reports (screenshots + CSV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appointment-reminder-bn-en-reports
          path: reports/
          if-no-files-found: ignore

      - name: Slack Bengali Appointment Reminder PASS notification
        if: steps.appt-bn.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Bengali Appointment Reminder regression passed\nBot correctly greeted in Bengali and handled multi-turn confirmation flow.\nTest: tests/appointment-reminder-bn-en.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Bengali Appointment Reminder FAIL notification
        if: steps.appt-bn.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Bengali Appointment Reminder regression failed\nFlow: Bengali greeting, first user message, second user message, final response.\nTest: tests/appointment-reminder-bn-en.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Fail workflow if any test failed ──────────────────────────────────

      - name: Fail workflow if any test failed
        if: steps.novo.outcome == 'failure' || steps.novo-mh.outcome == 'failure' || steps.taibah.outcome == 'failure' || steps.monarch.outcome == 'failure' || steps.appt-bn.outcome == 'failure'
        run: exit 1
