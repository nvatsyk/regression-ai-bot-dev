name: Regression AI Bot Tests 09:15

on:
  workflow_dispatch:

  schedule:
    # 05:15 Kyiv time = 02:15 UTC
    - cron: '15 2 * * *'

concurrency:
  group: regression-ai-bot-tests-0915
  cancel-in-progress: false

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      # ── Famatechnologies BDR ──────────────────────────────────────────────

      - name: Run Famatechnologies BDR regression
        id: fama
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-famatechnologies-bdr
        run: npx playwright test tests/famatechnologies-bdr.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Famatechnologies BDR HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: famatechnologies-bdr-playwright-report
          path: playwright-report-famatechnologies-bdr/
          if-no-files-found: ignore

      - name: Slack Famatechnologies BDR PASS notification
        if: steps.fama.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Famatechnologies BDR regression passed\nBot correctly captured name and requested phone number.\nTest: tests/famatechnologies-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Famatechnologies BDR FAIL notification
        if: steps.fama.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Famatechnologies BDR regression failed\nFlow: Name capture and phone number request.\nTest: tests/famatechnologies-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Solix BDR ─────────────────────────────────────────────────────────

      - name: Run Solix BDR regression
        id: solix
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-solix-bdr
        run: npx playwright test tests/solix-bdr.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Solix BDR HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solix-bdr-playwright-report
          path: playwright-report-solix-bdr/
          if-no-files-found: ignore

      - name: Slack Solix BDR PASS notification
        if: steps.solix.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Solix BDR regression passed\nBot correctly captured name and introduced Solix services.\nTest: tests/solix-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Solix BDR FAIL notification
        if: steps.solix.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Solix BDR regression failed\nFlow: Name capture and Solix intro.\nTest: tests/solix-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── SPsoft BDR ────────────────────────────────────────────────────────

      - name: Run SPsoft BDR regression
        id: spsoft
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-spsoft-bdr
        run: npx playwright test tests/spsoft-bdr.spec.js --reporter=html
        continue-on-error: true

      - name: Upload SPsoft BDR HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spsoft-bdr-playwright-report
          path: playwright-report-spsoft-bdr/
          if-no-files-found: ignore

      - name: Slack SPsoft BDR PASS notification
        if: steps.spsoft.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ SPsoft BDR regression passed\nBot correctly greeted, captured name, and listed services.\nTest: tests/spsoft-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack SPsoft BDR FAIL notification
        if: steps.spsoft.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ SPsoft BDR regression failed\nFlow: Greeting, name capture, and services list.\nTest: tests/spsoft-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Nextlevel.ai BDR ──────────────────────────────────────────────────

      - name: Run Nextlevel.ai BDR regression
        id: nlai
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-nextlevel-ai-bdr
        run: npx playwright test tests/nextlevel-ai-bdr.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Nextlevel.ai BDR HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextlevel-ai-bdr-playwright-report
          path: playwright-report-nextlevel-ai-bdr/
          if-no-files-found: ignore

      - name: Slack Nextlevel.ai BDR PASS notification
        if: steps.nlai.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Nextlevel.ai BDR regression passed\nBot correctly handled greeting, name, phone skip, and email capture.\nTest: tests/nextlevel-ai-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Nextlevel.ai BDR FAIL notification
        if: steps.nlai.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Nextlevel.ai BDR regression failed\nFlow: Greeting, name capture, phone skip, email capture.\nTest: tests/nextlevel-ai-bdr.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Merkel LTD ───────────────────────────────────────────────────────

      - name: Run Merkel LTD regression
        id: merkel
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-merkel-ltd
        run: npx playwright test tests/merkel-ltd.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Merkel LTD HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merkel-ltd-playwright-report
          path: playwright-report-merkel-ltd/
          if-no-files-found: ignore

      - name: Slack Merkel LTD PASS notification
        if: steps.merkel.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Merkel LTD regression passed\nBot correctly handled Boardroom greeting and cafe Q&A flow.\nTest: tests/merkel-ltd.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Merkel LTD FAIL notification
        if: steps.merkel.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Merkel LTD regression failed\nFlow: Boardroom greeting and cafe Q&A.\nTest: tests/merkel-ltd.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── JAKDelivery ──────────────────────────────────────────────────────────

      - name: Run JAKDelivery regression
        id: jak
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-jak-delivery
        run: npx playwright test tests/jak-delivery.spec.js --reporter=html
        continue-on-error: true

      - name: Upload JAKDelivery HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jak-delivery-playwright-report
          path: playwright-report-jak-delivery/
          if-no-files-found: ignore

      - name: Slack JAKDelivery PASS notification
        if: steps.jak.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ JAKDelivery regression passed\nBot correctly opened, greeted, and responded to services inquiry.\nTest: tests/jak-delivery.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack JAKDelivery FAIL notification
        if: steps.jak.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ JAKDelivery regression failed\nFlow: Bot greeting and services response.\nTest: tests/jak-delivery.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Fail workflow if any test failed ──────────────────────────────────

      - name: Fail workflow if any test failed
        if: >
          steps.fama.outcome == 'failure' ||
          steps.solix.outcome == 'failure' ||
          steps.spsoft.outcome == 'failure' ||
          steps.nlai.outcome == 'failure' ||
          steps.merkel.outcome == 'failure' ||
          steps.jak.outcome == 'failure'
        run: exit 1
