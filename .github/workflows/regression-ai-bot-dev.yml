name: Regression AI Bot Tests

on:
  workflow_dispatch:

  schedule:
    # 05:00 Kyiv time = 02:00 UTC
    - cron: '0 2 * * 1-5'

concurrency:
  group: regression-ai-bot-tests
  cancel-in-progress: false

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      # ── Keyless English ────────────────────────────────────────────────────

      - name: Run Keyless English regression
        id: keyless
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-keyless-english
        run: npx playwright test tests/keyless-english_2.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Keyless English HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: keyless-english-playwright-report
          path: playwright-report-keyless-english/
          if-no-files-found: ignore

      - name: Slack Keyless PASS notification
        if: ${{ steps.keyless.outcome == 'success' }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Keyless English regression passed\nBot correctly identified unlock method and offered options.\nTest: tests/keyless-english_2.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Keyless FAIL notification
        if: ${{ steps.keyless.outcome == 'failure' }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Keyless English regression failed\nFlow: Keyless unlock method check.\nTest: tests/keyless-english_2.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Chronilogix BDR ───────────────────────────────────────────────────

      - name: Run Chronilogix BDR regression
        id: chron
        env:
          PLAYWRIGHT_HTML_REPORT: playwright-report-chronilogix-bdr
        run: npx playwright test tests/chronilogix-bdr-simple.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Chronilogix BDR HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chronilogix-bdr-playwright-report
          path: playwright-report-chronilogix-bdr/
          if-no-files-found: ignore

      - name: Slack Chronilogix BDR PASS notification
        if: steps.chron.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Chronilogix BDR regression passed\nBot correctly handled mental health personal support flow.\nTest: tests/chronilogix-bdr-simple.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Slack Chronilogix BDR FAIL notification
        if: steps.chron.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_FAILED_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Chronilogix BDR regression failed\nFlow: Mental health personal support flow.\nTest: tests/chronilogix-bdr-simple.spec.js\nGitHub Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # ── Fail workflow if any test failed ──────────────────────────────────

      - name: Fail workflow if any test failed
        if: ${{ steps.keyless.outcome == 'failure' || steps.chron.outcome == 'failure' }}
        run: exit 1
