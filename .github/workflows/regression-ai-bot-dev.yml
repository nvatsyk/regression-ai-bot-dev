name: Regression AI Bot Tests

on:
  workflow_dispatch:

  schedule:
    # 09:00 Kyiv time = 06:00 UTC
    - cron: '0 6 * * *'

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright Browsers
        run: |
          chmod +x node_modules/.bin/playwright
          npx playwright install chromium

      # ── BFL_2 ──────────────────────────────────────────────────────────────

      - name: Run BFL_2 regression
        id: bfl2
        run: npx playwright test tests/bfl_2.spec.js --reporter=html
        continue-on-error: true

      - name: Upload BFL_2 HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bfl-2-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Slack BFL_2 PASS notification
        if: steps.bfl2.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ BFL_2 regression passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ BFL_2 regression passed*\n\nBot correctly remembers completed onboarding after reopening Text Chat.\n\n*Test:* `tests/bfl_2.spec.js`\n*Status:* PASSED\n\nGitHub Run:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Slack BFL_2 FAIL notification
        if: steps.bfl2.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ BFL_2 regression failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ BFL_2 regression failed*\n\n*Bug:* Repeated onboarding detected after reopen.\n\nExpected behavior:\nBot should continue session and greet user normally.\n\n*Test:* `tests/bfl_2.spec.js`\n\nGitHub Run:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      # ── Keyless English ────────────────────────────────────────────────────

      - name: Run Keyless English regression
        id: keyless
        run: npx playwright test tests/keyless-english_2.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Keyless English HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keyless-english-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Slack Keyless PASS notification
        if: steps.keyless.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Keyless English regression passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Keyless English regression passed*\n\nBot correctly identified unlock method and offered options (mobile app, passcode, RFID, access card).\n\n*Test:* `tests/keyless-english_2.spec.js`\n*Status:* PASSED\n\nGitHub Run:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Slack Keyless FAIL notification
        if: steps.keyless.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Keyless English regression failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Keyless English regression failed*\n\n*Flow:* Keyless unlock method check.\n\nExpected behavior:\nBot should ask how the user is trying to unlock and offer method options (mobile app, passcode, RFID, access card).\n\n*Test:* `tests/keyless-english_2.spec.js`\n\nGitHub Run:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      # ── Chronilogix BDR ───────────────────────────────────────────────────

      - name: Run Chronilogix BDR regression
        id: chron
        run: npx playwright test tests/chronilogix-bdr.spec.js --reporter=html
        continue-on-error: true

      - name: Upload Chronilogix BDR HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chronilogix-bdr-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Slack Chronilogix BDR PASS notification
        if: steps.chron.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ Chronilogix BDR regression passed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Chronilogix BDR regression passed*\n\nBot correctly handled mental health personal support flow.\n\n*Test:* `tests/chronilogix-bdr.spec.js`\n*Status:* PASSED\n\nGitHub Run:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Slack Chronilogix BDR FAIL notification
        if: steps.chron.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Chronilogix BDR regression failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Chronilogix BDR regression failed*\n\n*Flow:* Mental health personal support flow.\n\nExpected behavior:\nBot should greet as Roni (Chronilogix AI), acknowledge user name, and accept mental health + personal support inputs.\n\n*Test:* `tests/chronilogix-bdr.spec.js`\n\nGitHub Run:\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      # ── Fail workflow if any test failed ──────────────────────────────────

      - name: Fail workflow if any test failed
        if: always()
        run: |
          if [ "${{ steps.bfl2.outcome }}" = "failure" ] || \
             [ "${{ steps.keyless.outcome }}" = "failure" ] || \
             [ "${{ steps.chron.outcome }}" = "failure" ]; then
            exit 1
          fi
